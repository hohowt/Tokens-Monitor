# New API 部署配置（AI 网关）
# 参考: https://github.com/Calcium-Ion/new-api
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api
  labels:
    app: new-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: new-api
  template:
    metadata:
      labels:
        app: new-api
    spec:
      containers:
        - name: new-api
          image: calciumion/new-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: SQL_DSN
              value: "host=postgres-service user=newapi password=CHANGE_ME dbname=newapi port=5432 sslmode=disable"
            - name: REDIS_CONN_STRING
              value: "redis://redis-service:6379/1"
            - name: SESSION_SECRET
              value: "CHANGE_ME_RANDOM_STRING"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: new-api-service
spec:
  selector:
    app: new-api
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: new-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - host: ai-gateway.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: new-api-service
                port:
                  number: 3000
